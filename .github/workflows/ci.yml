name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: observex-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GOWORK: "off"
  SRE_CI_POOL: "ci-observex"

jobs:
  format:
    name: Format (gofmt)
    runs-on: [self-hosted, Linux, X64, ci-observex]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Check gofmt
        run: |
          set -euo pipefail
          diffs=$(gofmt -l .)
          if [ -n "$diffs" ]; then
            echo "❌ 以下文件未通过 gofmt:"
            echo "$diffs"
            exit 1
          fi
          echo "✅ gofmt 0 diff"

  lint:
    name: Lint (golangci-lint)
    runs-on: [self-hosted, Linux, X64, ci-observex]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
      - name: make lint
        run: make lint

  vet:
    name: Vet
    runs-on: [self-hosted, Linux, X64, ci-observex]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: make vet
        run: make vet

  test:
    name: Test (-race -count=1)
    runs-on: [self-hosted, Linux, X64, ci-observex]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: go test -race -count=1
        run: GOWORK=off go test -race -count=1 ./...

  coverage:
    name: Coverage (≥80%)
    runs-on: [self-hosted, Linux, X64, ci-observex]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Generate coverage
        run: GOWORK=off go test -race -count=1 -covermode=atomic -coverprofile=coverage.out ./...
      - name: Check threshold (≥80%)
        run: |
          set -euo pipefail
          pct=$(go tool cover -func=coverage.out | awk '/^total:/ {print $3}' | tr -d '%')
          echo "Coverage: ${pct}%"
          if awk -v p="$pct" 'BEGIN{exit !(p>=80)}'; then
            echo "✅ ${pct}% ≥ 80%"
          else
            echo "❌ ${pct}% < 80%"
            exit 1
          fi
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: observex-coverage
          path: coverage.out
          if-no-files-found: warn

  security:
    name: Security (govulncheck)
    runs-on: [self-hosted, Linux, X64, ci-observex]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.3.0
      - name: govulncheck
        run: GOWORK=off govulncheck ./...

  build:
    name: Build
    runs-on: [self-hosted, Linux, X64, ci-observex]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: go build
        run: GOWORK=off go build ./...

  mod-tidy:
    name: go.mod tidy check
    runs-on: [self-hosted, Linux, X64, ci-observex]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Check go.mod/go.sum consistency
        run: |
          set -euo pipefail
          cp go.mod go.mod.bak
          cp go.sum go.sum.bak
          GOWORK=off go mod tidy
          if ! diff -q go.mod go.mod.bak >/dev/null || ! diff -q go.sum go.sum.bak >/dev/null; then
            echo "❌ go.mod/go.sum 不一致，请本地执行 'go mod tidy' 后提交"
            diff go.mod go.mod.bak || true
            diff go.sum go.sum.bak || true
            rm -f go.mod.bak go.sum.bak
            exit 1
          fi
          rm -f go.mod.bak go.sum.bak
          echo "✅ go.mod/go.sum 一致"

  boundary:
    name: Boundary check
    runs-on: [self-hosted, Linux, X64, ci-observex]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: make boundary
        run: make boundary

  release-check:
    name: Release version + evidence
    runs-on: [self-hosted, Linux, X64, ci-observex]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.3.0
      - name: Derive release version
        id: version
        run: |
          version="$(sed -nE 's/^[[:space:]]*Version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' pkg/observex/version.go | head -n1)"
          if [ -z "$version" ]; then
            echo "could not determine package version from pkg/observex/version.go"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Release Check
        run: VERSION="${version}" make release-check
        env:
          version: ${{ steps.version.outputs.version }}
      - name: Upload Manifest
        uses: actions/upload-artifact@v4
        with:
          name: release-manifest
          path: |
            release/manifest/*.json
            release/manifest/*.sha256
            release/downstream/adoption.json
          if-no-files-found: error

  # ── PR 治理门禁（Conventional Commits + 大小限制）─────────
  pr-title:
    name: "PR 标题格式"
    if: github.event_name == 'pull_request'
    runs-on: [self-hosted, Linux, X64, ci-observex]
    timeout-minutes: 3
    steps:
      - name: check PR title
        run: |
          title="${{ github.event.pull_request.title }}"
          pattern="^(feat|fix|refactor|docs|test|chore|perf|ci|revert|build)(\([^)]+\))?: .+"
          if echo "$title" | grep -qE "$pattern"; then
            echo "✅ PR 标题格式正确: $title"
          else
            echo "❌ PR 标题不符合 Conventional Commits 格式: $title"
            echo "   正确格式: <type>(<scope>): <描述>"
            exit 1
          fi

  pr-size:
    name: "PR 大小检查 (≤700 行)"
    if: github.event_name == 'pull_request'
    runs-on: [self-hosted, Linux, X64, ci-observex]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: check diff size
        run: |
          additions=$(git diff --shortstat origin/${{ github.event.pull_request.base.ref }}...HEAD | awk '{print $4}')
          deletions=$(git diff --shortstat origin/${{ github.event.pull_request.base.ref }}...HEAD | awk '{print $6}')
          additions=${additions:-0}
          deletions=${deletions:-0}
          total=$((additions + deletions))
          echo "变更: +${additions} -${deletions} = ${total} 行"
          if [ "$total" -gt 700 ]; then
            echo "❌ PR 变更 ${total} 行 > 700 行限制，请拆分"
            exit 1
          fi
          echo "✅ PR 大小 ${total} ≤ 700 行"
