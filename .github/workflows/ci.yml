name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI Core (SRE pool)
    uses: ZoneCNH/sre/.github/workflows/go-p0-core.yml@main

  release-check:
    name: CI (release check, Go stable)
    runs-on: [self-hosted, Linux, X64, sre/foundation-l1]
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          check-latest: true

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.1.6

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.3.0

      - name: Release Check
        run: |
          version="$(sed -nE 's/^[[:space:]]*Version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' pkg/observex/version.go | head -n1)"
          GOWORK=off VERSION="${version}" make release-check

      - name: Upload release evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-manifest-go-stable
          path: |
            release/manifest/*.json
            release/manifest/*.sha256
            release/downstream/adoption.json
          if-no-files-found: error
