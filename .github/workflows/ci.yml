name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  release-check:
    name: CI (release check, Go stable)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          check-latest: true

      - name: Cache Go
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-stable-${{ hashFiles('**/go.sum') }}

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.1.6

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.3.0

      - name: Release Check
        run: |
          version="$(sed -nE 's/^[[:space:]]*Version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' pkg/observex/version.go | head -n1)"
          GOWORK=off VERSION="${version}" make release-check

      - name: Upload release evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-manifest-go-stable
          path: |
            release/manifest/*.json
            release/manifest/*.sha256
            release/downstream/adoption.json
          if-no-files-found: error

  go123-compat:
    name: CI (Go 1.23 compatibility)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
          check-latest: true

      - name: Cache Go
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-1.23.x-${{ hashFiles('**/go.sum') }}

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.1.6

      - name: Compatibility Check
        run: GOWORK=off make fmt vet lint test race examples boundary contracts integration

  tip-smoke:
    name: CI (Go tip, experimental)
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup stable Go for gotip bootstrap
        uses: actions/setup-go@v5
        with:
          go-version: stable
          check-latest: true

      - name: Install gotip
        run: go install golang.org/dl/gotip@latest

      - name: Download Go tip
        run: $(go env GOPATH)/bin/gotip download

      - name: Go tip smoke
        run: GOWORK=off $(go env GOPATH)/bin/gotip test ./...
