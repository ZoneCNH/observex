name: Security

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: observex-security-${{ github.ref }}
  cancel-in-progress: true

env:
  GOWORK: "off"

jobs:
  security:
    runs-on: [self-hosted, Linux, X64, ci-observex]
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          check-latest: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.3.0

      - name: Security
        run: GOWORK=off make security
